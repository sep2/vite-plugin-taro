{
  "defaults": {
    "timeoutMs": 20000
  },
  "tools": [
    {
      "id": "open_project_window",
      "name": "打开项目窗口",
      "summary": "打开包含模拟器的项目窗口。如果之前窗口已存在，则不打开新窗口，直接返回已打开的窗口 ID",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "项目本地绝对路径；根目录必须包含 project.config.json"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "open_project_window"
      }
    },
    {
      "id": "close_project_window",
      "name": "关闭项目窗口",
      "summary": "关闭包含模拟器的项目窗口，不等于完全退出微信开发者工具",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "项目本地绝对路径；根目录必须包含 project.config.json"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "close_project_window"
      }
    },
    {
      "id": "project_list",
      "name": "列出已导入项目",
      "summary": "只读列出微信开发者工具已导入的项目列表；默认返回主列表（小程序/小游戏等），可通过 scope 查看其他项目。不等于打开项目窗口。",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "project-manager"
      ],
      "inputSchema": {
        "scope": {
          "type": "string",
          "required": false,
          "description": "列表范围：miniprogram（默认）、other、all"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "project_list"
      }
    },
    {
      "id": "project_import",
      "name": "导入项目到列表",
      "summary": "将本地项目目录导入 DevTools 项目列表，不打开项目窗口；路径已在列表中时返回 alreadyImported。与 project_open_window 不同，不做 appid 权限预检，无效目录由底层 importProject 报错。",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "project-manager"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "项目本地绝对路径"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "project_import"
      }
    },
    {
      "id": "project_remove",
      "name": "从列表删除项目",
      "summary": "从微信开发者工具项目列表移除项目，不删除磁盘文件，不等于 project_close_window；云存储项目不支持；执行前会弹出 MCP 操作确认。",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "project-manager"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true,
          "description": "要从列表移除的项目本地绝对路径"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "project_remove"
      }
    },
    {
      "id": "buildnpm",
      "name": "构建 npm",
      "summary": "构建 npm。",
      "group": "project",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer",
        "compiler"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true
        },
        "compile-type": {
          "type": "string",
          "required": false
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "buildnpm"
      }
    },
    {
      "id": "automation_runtime_info",
      "name": "运行时信息",
      "summary": "读取 DevTools 当前项目窗口和运行时信息，包括 pageStack、currentPage 或 systemInfo。",
      "group": "automation",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer",
        "automator",
        "debugger"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true
        },
        "action": {
          "type": "string",
          "required": true
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "automation_runtime_info"
      }
    },
    {
      "id": "check_devtools_status",
      "name": "读取微信开发者工具状态",
      "summary": "读取微信开发者工具登录态、openid 和当前运行的 skill 版本号；连接失败时会用当前 clientName 自动 auth 一次并重试。",
      "group": "runtime",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {
        "version": {
          "type": "string",
          "required": false,
          "description": "当前调用侧 agent 加载的 miniprogram-dev-skill/skill.yaml 文件中的 version 字段值；不传则跳过版本对比提醒。"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "check_devtools_status"
      }
    },
    {
      "id": "get_user_appids",
      "name": "获取用户可管理的全部 AppID",
      "summary": "获取当前登录用户可管理的全部 AppID 列表。",
      "group": "runtime",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "initializer"
      ],
      "inputSchema": {},
      "execution": {
        "transport": "skill_call",
        "toolName": "get_user_appids"
      }
    },
    {
      "id": "create_preview_qrcode",
      "name": "获取小程序预览二维码",
      "summary": "生成可扫码的小程序预览二维码。默认使用 qr-format=window 在新窗口中展示，无需指定本地输出路径。",
      "group": "preview",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "previewer"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true
        },
        "qr-format": {
          "type": "string",
          "required": false,
          "enum": [
            "window",
            "image"
          ],
          "description": "二维码展示方式。使用 window 在新窗口中展示。"
        },
        "qr-output": {
          "type": "string",
          "required": false,
          "description": "二维码图片以文件形式输出的目标位置。"
        },
        "page-path": {
          "type": "string",
          "required": false,
          "description": "指定的预览页面路径，如 page/index"
        },
        "query": {
          "type": "string",
          "required": false,
          "description": "指定的预览页面的参数参数，如 a=b，多个参数用 & 连接，如 a=b&c=d"
        },
        "scene": {
          "type": "string",
          "required": false,
          "description": "指定的预览进入的场景值，如 1001"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "create_preview_qrcode"
      }
    },
    {
      "id": "auto_preview",
      "name": "推送手机预览",
      "summary": "把预览直接推送到开发者微信，无需生成二维码文件。适合”直接发到手机看”场景。只需传 project 参数，可选传 page-path、scene、query 参数，不要传额外的本地输出路径参数。",
      "group": "preview",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "previewer"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": true
        },
        "page-path": {
          "type": "string",
          "required": false,
          "description": "指定的预览页面路径，如 page/index"
        },
        "query": {
          "type": "string",
          "required": false,
          "description": "指定的预览页面的参数参数，如 a=b，多个参数用 & 连接，如 a=b&c=d"
        },
        "scene": {
          "type": "string",
          "required": false,
          "description": "指定的预览进入的场景值，如 1001"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "auto_preview"
      }
    },
    {
      "id": "cloud_env_list",
      "name": "列出云环境",
      "summary": "列出小程序可用云环境。",
      "group": "cloud",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "cloudbase-operator"
      ],
      "inputSchema": {
        "project": {
          "type": "string",
          "required": false
        },
        "appid": {
          "type": "string",
          "required": false
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "cloud_env_list"
      }
    },
    {
      "id": "cloud_db_read_struct",
      "name": "读取云数据库结构",
      "summary": "只读查询 NoSQL 集合与索引结构。env 请先用 cloud_env_list 获取。",
      "group": "cloud",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "cloudbase-operator"
      ],
      "inputSchema": {
        "appid": {
          "type": "string",
          "required": true,
          "description": "小程序 AppID"
        },
        "env": {
          "type": "string",
          "required": true,
          "description": "云开发环境 ID，请先用 cloud_env_list 获取"
        },
        "action": {
          "type": "string",
          "required": true,
          "description": "listCollections | describeCollection | checkCollection | listIndexes | checkIndex"
        },
        "collectionName": {
          "type": "string",
          "required": false,
          "description": "集合名称；describeCollection/listIndexes/checkCollection 时使用"
        },
        "indexName": {
          "type": "string",
          "required": false,
          "description": "索引名称；checkIndex 时使用"
        },
        "limit": {
          "type": "number",
          "required": false,
          "description": "返回数量限制"
        },
        "offset": {
          "type": "number",
          "required": false,
          "description": "分页偏移"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "cloud_db_read_struct"
      }
    },
    {
      "id": "cloud_db_write_struct",
      "name": "修改云数据库结构",
      "summary": "修改云数据库集合结构（创建/删除集合、管理索引），属于写操作，需用户确认。env 请先用 cloud_env_list 获取。",
      "group": "cloud",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "cloudbase-operator"
      ],
      "inputSchema": {
        "appid": {
          "type": "string",
          "required": true,
          "description": "小程序 AppID"
        },
        "env": {
          "type": "string",
          "required": true,
          "description": "云开发环境 ID，请先用 cloud_env_list 获取"
        },
        "action": {
          "type": "string",
          "required": true,
          "description": "createCollection | updateCollection | deleteCollection"
        },
        "collectionName": {
          "type": "string",
          "required": true,
          "description": "集合名称"
        },
        "updateOptions": {
          "type": "object",
          "required": false,
          "description": "updateCollection 使用；CreateIndexes 添加索引，DropIndexes 删除索引"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "cloud_db_write_struct"
      }
    },
    {
      "id": "cloud_db_read_doc",
      "name": "读取云数据库内容",
      "summary": "只读查询 NoSQL 集合文档，支持条件、投影、排序和分页。env 请先用 cloud_env_list 获取。",
      "group": "cloud",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "cloudbase-operator"
      ],
      "inputSchema": {
        "appid": {
          "type": "string",
          "required": true,
          "description": "小程序 AppID"
        },
        "env": {
          "type": "string",
          "required": true,
          "description": "云开发环境 ID，请先用 cloud_env_list 获取"
        },
        "collectionName": {
          "type": "string",
          "required": true,
          "description": "集合名称"
        },
        "query": {
          "type": "object",
          "required": false,
          "description": "查询条件对象"
        },
        "projection": {
          "type": "object",
          "required": false,
          "description": "返回字段投影"
        },
        "sort": {
          "type": "array",
          "required": false,
          "description": "排序条件，如 [{\"key\":\"createdAt\",\"direction\":-1}]"
        },
        "limit": {
          "type": "number",
          "required": false,
          "description": "返回数量限制"
        },
        "offset": {
          "type": "number",
          "required": false,
          "description": "跳过记录数"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "cloud_db_read_doc"
      }
    },
    {
      "id": "cloud_db_write_doc",
      "name": "修改云数据库内容",
      "summary": "修改云数据库集合文档（插入/更新/删除），属于写操作，需用户确认。env 请先用 cloud_env_list 获取。",
      "group": "cloud",
      "source": {
        "type": "devtools"
      },
      "scenes": [
        "cloudbase-operator"
      ],
      "inputSchema": {
        "appid": {
          "type": "string",
          "required": true,
          "description": "小程序 AppID"
        },
        "env": {
          "type": "string",
          "required": true,
          "description": "云开发环境 ID，请先用 cloud_env_list 获取"
        },
        "action": {
          "type": "string",
          "required": true,
          "description": "insert | update | delete"
        },
        "collectionName": {
          "type": "string",
          "required": true,
          "description": "集合名称"
        },
        "documents": {
          "type": "array",
          "required": false,
          "description": "insert 操作的文档数组"
        },
        "query": {
          "type": "object",
          "required": false,
          "description": "update/delete 操作的查询条件"
        },
        "update": {
          "type": "object",
          "required": false,
          "description": "update 操作的更新内容，推荐使用 $set/$inc/$unset 等操作符"
        },
        "isMulti": {
          "type": "boolean",
          "required": false,
          "description": "是否更新或删除多条记录"
        },
        "upsert": {
          "type": "boolean",
          "required": false,
          "description": "update 时不存在则插入"
        }
      },
      "execution": {
        "transport": "skill_call",
        "toolName": "cloud_db_write_doc"
      }
    },
    {
      "id": "cloud_stor_read",
      "name": "读取云存储",
